name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs older than 2 weeks
        uses: actions/github-script@v7
        with:
          script: |
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 14);

            // Fetch all workflows in the repo
            const workflows = await github.paginate(
              github.rest.actions.listRepoWorkflows,
              { owner: context.repo.owner, repo: context.repo.repo }
            );

            for (const workflow of workflows) {
              // Fetch all runs for each workflow
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflow.id,
                  per_page: 100,
                }
              );

              for (const run of runs) {
                if (new Date(run.created_at) < cutoff) {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                  console.log(`Deleted run #${run.id} (${run.created_at}) from workflow "${workflow.name}"`);
                }
              }
            }
